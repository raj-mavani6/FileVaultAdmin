version: '3.8'
services:
  mongodb:
    image: mongo:7
    container_name: filevault-mongodb
    ports:
      - "27017:27017"
    volumes:
      - filevault_mongo_data:/data/db
    environment:
      # No auth for local development. Add MONGO_INITDB_ROOT_USERNAME/PASSWORD for production.
      MONGO_INITDB_DATABASE: FileVault_Dev
    restart: unless-stopped

volumes:
  filevault_mongo_data:
    driver: local
